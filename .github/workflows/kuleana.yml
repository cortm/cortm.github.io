name: Build Kuleana

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/kuleana/src/**'
      - 'apps/kuleana/index.html'
      - 'apps/kuleana/package.json'
      - 'apps/kuleana/package-lock.json'
      - 'apps/kuleana/vite.config.ts'
      - 'apps/kuleana/tsconfig.json'
      - 'apps/kuleana/tsconfig.node.json'
      - '.github/workflows/kuleana.yml'

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/kuleana/package-lock.json

      - name: Install and build
        working-directory: apps/kuleana
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_HOUSEHOLD_ID: ${{ secrets.VITE_HOUSEHOLD_ID || 'kuleana' }}
        run: |
          npm ci
          npm run build

      - name: Commit and push dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/kuleana/dist
          if git diff --staged --quiet; then
            echo "No dist changes"
            exit 0
          fi
          git commit -m "chore: rebuild Kuleana dist [skip ci]"
          git push
